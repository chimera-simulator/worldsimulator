name: Repo1 Harvest Cycle (T0 -> T5)

# Chạy 1 chu kỳ đầy đủ của Design Pattern Harvester (main.py:run_pipeline_once).
# KHÔNG chạy nền liên tục (đúng nguyên tắc mục 104 SPEC — Free Tier Strategy):
# chỉ trigger thủ công (workflow_dispatch) hoặc theo lịch cron thưa để tiết
# kiệm phút chạy của GitHub Actions Free Tier (2000 phút/tháng).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Chạy dry-run (không upload MongoDB, chỉ log)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      # [CODER 1 — Blackbook Lifecycle] Cho phép người vận hành chủ động
      # force reset cache blackbook (đổi slot) mà KHÔNG cần sửa code/merge PR.
      blackbook_cache_slot:
        description: "Cache slot cho blackbook (đổi sang slot mới để force reset, VD: v3, v4...)"
        required: false
        default: "v2"
        type: string
      reset_blackbook:
        description: "Xóa toàn bộ trạng thái banned trước khi chạy (dùng khi blackbook bị đóng băng)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
  schedule:
    # 06:00 UTC mỗi ngày (~13:00 giờ VN) — 1 chu kỳ/ngày, điều chỉnh theo nhu cầu.
    - cron: "0 6 * * *"

concurrency:
  # Không cho 2 chu kỳ chạy chồng lên nhau (tránh race trên blackbook.json).
  group: repo1-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    # [CODER 2 — Budget Theo Thời Gian, 2026-07-11] Tăng từ 30 -> 55 phút.
    # Python tự graceful stop lúc 45 phút (BUDGET_MAX_SECONDS=2700, xem
    # core/budget_manager.py + main.py::_check_time_and_stop()). 55 phút ở
    # đây chỉ còn là "cầu chì cuối" phòng trường hợp Python bị treo/deadlock
    # (timeout-minutes của GitHub là hard-kill, không có cleanup).
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser (Chromium only)
        run: python -m playwright install --with-deps chromium

      # blackbook.json giữ round-robin cursor + dedup keyword giữa các lần
      # chạy (main.py là nơi DUY NHẤT load/save — xem docstring main.py).
      # Runner GitHub Actions ephemeral nên phải cache file này qua actions/cache,
      # khóa cache cố định + luôn restore-and-resave (không dùng hash key).
      # [RESET 2026-07-10] Đổi v1 -> v2: blackbook.json cũ (cache
      # repo1-blackbook-v1) đang chứa trạng thái "banned" GIẢ cho
      # DuckDuckGo/Brave/Startpage do bug get_stealth_headers() ở
      # t0_search.py (đã fix). Bump key để lần chạy này CACHE-MISS có
      # chủ đích, main.py tự tạo blackbook rỗng (xem load_blackbook() —
      # không thấy file -> trả schema rỗng mặc định), không cần xoá cache
      # cũ qua API.
      # [CODER 1 — Blackbook Lifecycle, 2026-07-11] Cache key immutable theo
      # GitHub Actions -> không ghi đè/xóa được qua workflow, mỗi lần muốn
      # reset trước đây phải sửa code (bump version) + merge PR. Giờ key lấy
      # từ input `blackbook_cache_slot` (mặc định "v2") -> người vận hành có
      # thể chủ động đổi sang slot mới (VD: v3, v4...) ngay khi trigger
      # workflow_dispatch, không cần sửa code.
      - name: Restore blackbook.json (round-robin/dedup state)
        uses: actions/cache/restore@v4
        with:
          path: blackbook.json
          key: repo1-blackbook-${{ inputs.blackbook_cache_slot || 'v2' }}

      - name: Run harvest cycle (T0 -> T5)
        env:
          # [CODER 1 — Blackbook Lifecycle] Gỡ ban toàn bộ domain trước khi
          # chạy nếu người vận hành trigger workflow_dispatch với
          # reset_blackbook=true (xem domain_ban.force_unban_all() +
          # main.py ngay sau load_blackbook()).
          RESET_BLACKBOOK: ${{ inputs.reset_blackbook || 'false' }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ vars.MONGODB_DB_NAME || 'world_simulator' }}
          GEMINI_MODEL_NO_1: ${{ secrets.GEMINI_KEY_1 }}
          GEMINI_MODEL_NO_2: ${{ secrets.GEMINI_KEY_2 }}
          GEMINI_MODEL_NO_3: ${{ secrets.GEMINI_KEY_3 }}
          GEMINI_MODEL_NO_4: ${{ secrets.GEMINI_KEY_4 }}
          GEMINI_MODEL_NO_5: ${{ secrets.GEMINI_KEY_5 }}
          GEMINI_MODEL_NO_6: ${{ secrets.GEMINI_KEY_6 }}
          GEMINI_MODEL_NO_7: ${{ secrets.GEMINI_KEY_7 }}
          GEMINI_MODEL_NAME: ${{ vars.GEMINI_MODEL_NAME || 'gemini-2.5-flash' }}

          # [MỚI] Budget controls — có thể override qua GitHub Variables
          BUDGET_MAX_URLS:         ${{ vars.BUDGET_MAX_URLS || '150' }}
          BUDGET_MAX_GEMINI_CALLS: ${{ vars.BUDGET_MAX_GEMINI_CALLS || '300' }}
          BUDGET_MAX_TOKENS:       ${{ vars.BUDGET_MAX_TOKENS || '300000' }}
          BUDGET_MAX_BROWSER_CALLS: ${{ vars.BUDGET_MAX_BROWSER_CALLS || '15' }}
          # [CODER 2 — Budget Theo Thời Gian] Graceful-stop time budget (giây).
          # 2700s = 45 phút, margin 10 phút trước timeout-minutes=55 ở trên.
          BUDGET_MAX_SECONDS: ${{ vars.BUDGET_MAX_SECONDS || '2700' }}
        run: python main.py

      # Luôn lưu lại blackbook.json mới nhất, kể cả khi bước trên fail giữa
      # chừng (main.py ghi trong khối finally) — dùng if: always().
      - name: Save blackbook.json (round-robin/dedup state)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: blackbook.json
          key: repo1-blackbook-${{ inputs.blackbook_cache_slot || 'v2' }}

      - name: Upload run log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo1-harvest-log-${{ github.run_id }}
          path: blackbook.json
          retention-days: 14
